<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pokemon AMSO — Demo Phase 0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
    gap: 16px;
  }

  h1 {
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #7ecfff;
  }

  #game-wrapper {
    position: relative;
    border: 2px solid #333;
    image-rendering: pixelated;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #hud {
    display: flex;
    gap: 24px;
    font-size: 11px;
    color: #888;
  }

  #hud span { color: #7ecfff; }

  #controls {
    font-size: 11px;
    color: #555;
    text-align: center;
    line-height: 1.8;
  }

  #controls b { color: #aaa; }

  #phase-badge {
    background: #0f3460;
    border: 1px solid #7ecfff44;
    color: #7ecfff;
    padding: 4px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="phase-badge">Phase 0 — Overworld</div>
<h1>Pokemon AMSO</h1>

<div id="game-wrapper">
  <canvas id="canvas"></canvas>
</div>

<div id="hud">
  Position tile : <span id="hud-tile">3, 3</span>
  &nbsp;|&nbsp;
  Direction : <span id="hud-dir">BAS</span>
  &nbsp;|&nbsp;
  État : <span id="hud-state">Idle</span>
</div>

<div id="controls">
  <b>ZQSD</b> ou <b>Flèches</b> — déplacement tile par tile<br>
  Même logique que <b>Player.gd</b> dans Godot 4
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — miroir de project.godot et Player.gd
// ─────────────────────────────────────────────────────────────────────────────
const TILE      = 16;       // px par tile (identique à TILE_SIZE dans Player.gd)
const SPEED     = 128;      // px/sec (identique à WALK_SPEED)
const SCALE     = 3;        // upscale pour l'affichage (320×240 → 960×720)
const VIEWPORT  = { w: 320, h: 240 };
const MAP       = { w: 512, h: 384 };   // 32×24 tiles

// ─────────────────────────────────────────────────────────────────────────────
// SETUP CANVAS
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = VIEWPORT.w * SCALE;
canvas.height = VIEWPORT.h * SCALE;
ctx.imageSmoothingEnabled = false;

// Buffer interne 320×240 (pixel-art)
const buf    = document.createElement('canvas');
buf.width    = VIEWPORT.w;
buf.height   = VIEWPORT.h;
const bctx   = buf.getContext('2d');
bctx.imageSmoothingEnabled = false;

// ─────────────────────────────────────────────────────────────────────────────
// ENTRÉE CLAVIER — miroir de _read_direction() dans Player.gd
// ─────────────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

function readDirection() {
  if (keys['KeyZ']    || keys['ArrowUp'])    return { x: 0, y: -1 };
  if (keys['KeyS']    || keys['ArrowDown'])  return { x: 0, y:  1 };
  if (keys['KeyQ']    || keys['ArrowLeft'])  return { x:-1, y:  0 };
  if (keys['KeyD']    || keys['ArrowRight']) return { x: 1, y:  0 };
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// MAP — obstacles (StaticBody2D dans TestMap.tscn)
// ─────────────────────────────────────────────────────────────────────────────
// Obstacles définis en tiles (col, row, largeur, hauteur)
const OBSTACLES = [
  // Maison brune — position 256,160 → tile 16,10 → 4×2 tiles
  { col: 14, row: 8,  w: 4, h: 2, color: '#8b4513', label: 'Maison' },
  // Rocher gris — position 128,240 → tile 8,15 → 2×4 tiles
  { col: 6,  row: 13, w: 2, h: 4, color: '#808080', label: 'Rocher' },
  // Arbres (ajouts visuels pour enrichir la démo)
  { col: 2,  row: 6,  w: 2, h: 2, color: '#228B22', label: 'Arbre' },
  { col: 22, row: 4,  w: 2, h: 2, color: '#228B22', label: 'Arbre' },
  { col: 24, row: 14, w: 2, h: 2, color: '#228B22', label: 'Arbre' },
  { col: 4,  row: 18, w: 2, h: 2, color: '#228B22', label: 'Arbre' },
  { col: 18, row: 10, w: 2, h: 2, color: '#228B22', label: 'Arbre' },
];

// Ensemble des tiles bloquées (pour collision rapide)
const blockedTiles = new Set();
// Murs de bordure
for (let c = -1; c <= MAP.w / TILE; c++) {
  blockedTiles.add(`${c},-1`);
  blockedTiles.add(`${c},${MAP.h / TILE}`);
}
for (let r = -1; r <= MAP.h / TILE; r++) {
  blockedTiles.add(`-1,${r}`);
  blockedTiles.add(`${MAP.w / TILE},${r}`);
}
// Obstacles
for (const obs of OBSTACLES) {
  for (let dc = 0; dc < obs.w; dc++)
    for (let dr = 0; dr < obs.h; dr++)
      blockedTiles.add(`${obs.col + dc},${obs.row + dr}`);
}

function isTileBlocked(col, row) {
  return blockedTiles.has(`${col},${row}`);
}

// ─────────────────────────────────────────────────────────────────────────────
// JOUEUR — miroir exact de Player.gd
// ─────────────────────────────────────────────────────────────────────────────
const DIR_NAMES = { '0,-1': 'HAUT', '0,1': 'BAS', '-1,0': 'GAUCHE', '1,0': 'DROITE' };
const DIR_FACING = { '0,-1': '▲', '0,1': '▼', '-1,0': '◄', '1,0': '►' };

const player = {
  // Position monde en pixels (snappée sur la grille)
  x: 3 * TILE,
  y: 3 * TILE,

  // État de déplacement (miroir de _moving, _move_from, _move_to, _move_progress)
  moving:   false,
  fromX:    3 * TILE,
  fromY:    3 * TILE,
  toX:      3 * TILE,
  toY:      3 * TILE,
  progress: 0,

  // Direction regard
  facing: { x: 0, y: 1 },

  // Historique des positions (pour l'effet de trace)
  trail: [],

  get tileCol() { return Math.round(this.x / TILE); },
  get tileRow() { return Math.round(this.y / TILE); },
};

// ─────────────────────────────────────────────────────────────────────────────
// LOGIQUE DE MISE À JOUR — miroir de _physics_process()
// ─────────────────────────────────────────────────────────────────────────────
function update(delta) {
  if (player.moving) {
    tickMovement(delta);
  } else {
    pollInput();
  }
}

// Miroir de _poll_input()
function pollInput() {
  const dir = readDirection();
  if (!dir) return;

  player.facing = dir;

  const nextCol = player.tileCol + dir.x;
  const nextRow = player.tileRow + dir.y;

  // Miroir de move_and_collide(..., true) — test collision avant de bouger
  if (isTileBlocked(nextCol, nextRow)) {
    return;  // Obstacle — on ne bouge pas
  }

  // Lancer le déplacement fluide (miroir de _start_move)
  player.fromX     = player.x;
  player.fromY     = player.y;
  player.toX       = nextCol * TILE;
  player.toY       = nextRow * TILE;
  player.progress  = 0;
  player.moving    = true;

  // Trace visuelle
  player.trail.push({ x: player.x, y: player.y, alpha: 1.0 });
  if (player.trail.length > 6) player.trail.shift();
}

// Miroir de _tick_movement()
function tickMovement(delta) {
  player.progress += delta * SPEED / TILE;

  if (player.progress >= 1.0) {
    player.x      = player.toX;
    player.y      = player.toY;
    player.moving = false;
    player.progress = 0;
    // EventBus.player_stepped.emit(position) — ici on met juste à jour le HUD
    updateHUD();
  } else {
    // Lerp (identique à _move_from.lerp(_move_to, _move_progress))
    player.x = player.fromX + (player.toX - player.fromX) * player.progress;
    player.y = player.fromY + (player.toY - player.fromY) * player.progress;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDU — sur buffer 320×240, puis upscalé ×3
// ─────────────────────────────────────────────────────────────────────────────

// Palette de couleurs (style GBA)
const PALETTE = {
  groundLight: '#38a832',
  groundDark:  '#2d8a28',
  gridLine:    '#2a7526',
  playerBody:  '#3468f0',
  playerEye:   '#ffffff',
  playerShadow:'#1a3890',
};

// Caméra — centré sur le joueur
let camX = 0, camY = 0;

function updateCamera() {
  const targetX = player.x - VIEWPORT.w / 2;
  const targetY = player.y - VIEWPORT.h / 2;
  // Lerp caméra douce
  camX += (targetX - camX) * 0.15;
  camY += (targetY - camY) * 0.15;
  // Clamp dans les limites de la map
  camX = Math.max(0, Math.min(MAP.w - VIEWPORT.w, camX));
  camY = Math.max(0, Math.min(MAP.h - VIEWPORT.h, camY));
}

function drawMap() {
  // Sol en damier (2 tons de vert)
  for (let row = 0; row < MAP.h / TILE; row++) {
    for (let col = 0; col < MAP.w / TILE; col++) {
      const wx = col * TILE - camX;
      const wy = row * TILE - camY;
      if (wx + TILE < 0 || wx > VIEWPORT.w || wy + TILE < 0 || wy > VIEWPORT.h) continue;
      bctx.fillStyle = (col + row) % 2 === 0 ? PALETTE.groundLight : PALETTE.groundDark;
      bctx.fillRect(wx, wy, TILE, TILE);
    }
  }
}

function drawObstacles() {
  for (const obs of OBSTACLES) {
    const wx = obs.col * TILE - camX;
    const wy = obs.row * TILE - camY;
    const pw = obs.w * TILE;
    const ph = obs.h * TILE;
    if (wx + pw < 0 || wx > VIEWPORT.w || wy + ph < 0 || wy > VIEWPORT.h) continue;

    bctx.fillStyle = obs.color;
    bctx.fillRect(wx, wy, pw, ph);

    // Ombre portée
    bctx.fillStyle = 'rgba(0,0,0,0.25)';
    bctx.fillRect(wx + 1, wy + ph - 3, pw - 1, 3);

    // Highlight haut
    bctx.fillStyle = 'rgba(255,255,255,0.15)';
    bctx.fillRect(wx, wy, pw, 2);

    // Label (arbre = cercle vert sur le dessus)
    if (obs.label === 'Arbre') {
      bctx.fillStyle = '#145214';
      bctx.fillRect(wx, wy, pw, ph);
      bctx.fillStyle = '#1a7a1a';
      bctx.fillRect(wx + 2, wy + 2, pw - 4, ph - 4);
      bctx.fillStyle = '#22aa22';
      bctx.fillRect(wx + 4, wy + 2, pw - 8, 3);
    }
  }
}

function drawTrail() {
  for (let i = 0; i < player.trail.length; i++) {
    const t = player.trail[i];
    const alpha = (i + 1) / player.trail.length * 0.3;
    bctx.fillStyle = `rgba(52, 104, 240, ${alpha})`;
    bctx.fillRect(
      Math.floor(t.x - camX) + 2,
      Math.floor(t.y - camY) + 2,
      TILE - 4,
      TILE - 4
    );
  }
}

function drawPlayer() {
  const px = Math.floor(player.x - camX);
  const py = Math.floor(player.y - camY);

  // Ombre au sol
  bctx.fillStyle = 'rgba(0,0,0,0.2)';
  bctx.fillRect(px + 2, py + TILE - 3, TILE - 4, 3);

  // Corps (carré bleu — placeholder sprite)
  bctx.fillStyle = PALETTE.playerBody;
  bctx.fillRect(px + 1, py + 1, TILE - 2, TILE - 2);

  // Highlight haut-gauche
  bctx.fillStyle = '#6090ff';
  bctx.fillRect(px + 1, py + 1, TILE - 2, 2);
  bctx.fillRect(px + 1, py + 1, 2, TILE - 2);

  // Direction — "yeux" qui montrent où le joueur regarde
  bctx.fillStyle = PALETTE.playerEye;
  const fx = player.facing.x;
  const fy = player.facing.y;
  const eyeCx = px + TILE / 2 + fx * 3;
  const eyeCy = py + TILE / 2 + fy * 3;
  const perp = { x: fy, y: -fx };
  bctx.fillRect(eyeCx + perp.x * 2 - 1, eyeCy + perp.y * 2 - 1, 2, 2);
  bctx.fillRect(eyeCx - perp.x * 2 - 1, eyeCy - perp.y * 2 - 1, 2, 2);
}

function drawGrid() {
  bctx.strokeStyle = 'rgba(0,0,0,0.08)';
  bctx.lineWidth = 0.5;
  const startCol = Math.floor(camX / TILE);
  const startRow = Math.floor(camY / TILE);
  const endCol = startCol + Math.ceil(VIEWPORT.w / TILE) + 1;
  const endRow = startRow + Math.ceil(VIEWPORT.h / TILE) + 1;
  for (let c = startCol; c <= endCol; c++) {
    const x = c * TILE - camX;
    bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, VIEWPORT.h); bctx.stroke();
  }
  for (let r = startRow; r <= endRow; r++) {
    const y = r * TILE - camY;
    bctx.beginPath(); bctx.moveTo(0, y); bctx.lineTo(VIEWPORT.w, y); bctx.stroke();
  }
}

function drawDebugBox() {
  const stateStr = player.moving ? `Move (${(player.progress * 100).toFixed(0)}%)` : 'Idle';
  const dirKey = `${player.facing.x},${player.facing.y}`;
  const dirStr = (DIR_FACING[dirKey] || '?') + ' ' + (DIR_NAMES[dirKey] || '?');

  bctx.fillStyle = 'rgba(0,0,0,0.55)';
  bctx.fillRect(2, 2, 130, 30);
  bctx.fillStyle = '#7ecfff';
  bctx.font = '6px monospace';
  bctx.fillText(`tile (${player.tileCol}, ${player.tileRow})  ${dirStr}`, 6, 11);
  bctx.fillStyle = '#aaaaaa';
  bctx.fillText(`état : ${stateStr}`, 6, 21);
}

function render() {
  // Fond map
  bctx.fillStyle = '#1a1a2e';
  bctx.fillRect(0, 0, VIEWPORT.w, VIEWPORT.h);

  drawMap();
  drawGrid();
  drawObstacles();
  drawTrail();
  drawPlayer();
  drawDebugBox();

  // Upscale ×3 → canvas final
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(buf, 0, 0, VIEWPORT.w * SCALE, VIEWPORT.h * SCALE);
}

// ─────────────────────────────────────────────────────────────────────────────
// BOUCLE DE JEU
// ─────────────────────────────────────────────────────────────────────────────
let lastTime = null;

function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const delta = Math.min((timestamp - lastTime) / 1000, 0.05); // cap à 50ms
  lastTime = timestamp;

  update(delta);
  updateCamera();
  render();

  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────────────────────────────────────
// HUD
// ─────────────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hud-tile').textContent  = `${player.tileCol}, ${player.tileRow}`;
  const dk = `${player.facing.x},${player.facing.y}`;
  document.getElementById('hud-dir').textContent   = DIR_NAMES[dk] || '?';
  document.getElementById('hud-state').textContent = player.moving ? 'En mouvement' : 'Idle';
}

// Mise à jour HUD en temps réel
setInterval(updateHUD, 100);

// ─────────────────────────────────────────────────────────────────────────────
// DÉMARRAGE
// ─────────────────────────────────────────────────────────────────────────────
camX = player.x - VIEWPORT.w / 2;
camY = player.y - VIEWPORT.h / 2;
requestAnimationFrame(loop);
</script>
</body>
</html>
