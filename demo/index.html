<script>
// ============================================================
//  POKEMON AMSO — Interactive Demo (Complete)
//  Single-canvas game: Title -> Starter -> Overworld -> Battle
//  Style: Pokemon GBA (FireRed/Emerald)
// ============================================================
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 640, H = 480;
const LW = 320, LH = 240; // logical size
const TILE = 16;

// ============================================================
// === CONSTANTS & COLORS ===
// ============================================================
const COL = {
  panel: '#292E47', border: '#475273', text: '#EBEBF5', gold: '#F5CC38',
  hpGreen: '#34D058', hpYellow: '#EBBA34', hpRed: '#E53935',
  expBlue: '#4D8CF2',
  types: {
    Normal:'#A8A878', Fire:'#F08030', Water:'#6890F0', Grass:'#78C850',
    Electric:'#F8D030', Ice:'#98D8D8', Fighting:'#C03028', Poison:'#A040A0',
    Ground:'#E0C068', Flying:'#A890F0', Psychic:'#F85888', Bug:'#A8B820',
    Rock:'#B8A038', Ghost:'#705898', Dragon:'#7038F8', Dark:'#705848',
    Steel:'#B8B8D0', Fairy:'#EE99AC'
  }
};

const FR_NAMES = {
  '001':'Bulbizarre','002':'Herbizarre','003':'Florizarre',
  '004':'Salameche','005':'Reptincel','006':'Dracaufeu',
  '007':'Carapuce','008':'Carabaffe','009':'Tortank',
  '010':'Chenipan','011':'Chrysacier','012':'Papilusion',
  '013':'Aspicot','014':'Coconfort','015':'Dardargnan',
  '016':'Roucool','017':'Roucoups','018':'Roucarnage',
  '019':'Rattata','020':'Rattatac','021':'Piafabec',
  '022':'Rapasdepic','023':'Abo','024':'Arbok',
  '025':'Pikachu','032':'Nidoran'
};

const FR_MOVES = {
  'tackle':'Charge','scratch':'Griffe','growl':'Rugissement',
  'tail_whip':'Mimi-Queue','ember':'Flammeche','bubble':'Ecume',
  'string_shot':'Secretion','poison_sting':'Dard-Venin','harden':'Armure',
  'sand_attack':'Jet de Sable','gust':'Tornade','quick_attack':'Vive-Attaque',
  'thunder_shock':'Eclair','horn_attack':'Koud\'Korne','vine_whip':'Fouet Lianes',
  'water_gun':'Pistolet a O','bite':'Morsure','leech_seed':'Vampigraine',
  'thunder_wave':'Cage Eclair','double_kick':'Double Pied'
};

// ============================================================
// === STATE MACHINE ===
// ============================================================
let gameState = 'LOADING';
let prevState = null;
let stateTimer = 0;

// ============================================================
// === INPUT ===
// ============================================================
const keys = {};
const justPressed = {};
const prevKeys = {};

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  e.preventDefault();
});

function updateInput() {
  for (const k in keys) {
    justPressed[k] = keys[k] && !prevKeys[k];
  }
  Object.assign(prevKeys, keys);
}

function isConfirm() { return justPressed['Enter'] || justPressed['Space']; }
function isCancel() { return justPressed['Escape']; }
function isUp() { return justPressed['ArrowUp'] || justPressed['KeyW']; }
function isDown() { return justPressed['ArrowDown'] || justPressed['KeyS']; }
function isLeft() { return justPressed['ArrowLeft'] || justPressed['KeyA'] || justPressed['KeyQ']; }
function isRight() { return justPressed['ArrowRight'] || justPressed['KeyD']; }
function isHeldUp() { return keys['ArrowUp'] || keys['KeyW']; }
function isHeldDown() { return keys['ArrowDown'] || keys['KeyS']; }
function isHeldLeft() { return keys['ArrowLeft'] || keys['KeyA'] || keys['KeyQ']; }
function isHeldRight() { return keys['ArrowRight'] || keys['KeyD']; }

// ============================================================
// === ASSET LOADING ===
// ============================================================
const images = {};
let loadCount = 0;
let loadTotal = 0;
let allLoaded = false;

function loadImage(key, path) {
  loadTotal++;
  const img = new Image();
  img.onload = () => { images[key] = img; loadCount++; checkLoaded(); };
  img.onerror = () => { images[key] = null; loadCount++; checkLoaded(); };
  img.src = path;
}

function checkLoaded() {
  if (loadCount >= loadTotal) allLoaded = true;
}

// JSON data
let pokemonData = {};
let movesData = {};
let typeChart = {};
let dataLoaded = 0;
const DATA_TOTAL = 3;

function loadJSON(url, cb) {
  fetch(url).then(r => r.json()).then(d => { cb(d); dataLoaded++; }).catch(() => { cb({}); dataLoaded++; });
}

function initAssets() {
  const base = '../';
  // Tilesets
  loadImage('tileset_grass', base + 'assets/tilesets/grass.png');
  loadImage('tileset_forest', base + 'assets/tilesets/forest.png');
  loadImage('tileset_legacy', base + 'assets/tiles/tileset.png');
  // Overworld sprites
  const owSprites = ['player','rival','youngster','lass','bug_catcher','prof_oak','nurse','shopkeeper'];
  owSprites.forEach(s => loadImage('ow_' + s, base + 'assets/sprites/overworld/' + s + '.png'));
  // Battle backgrounds
  ['grass','forest','cave'].forEach(s => loadImage('bbg_' + s, base + 'assets/sprites/battle/backgrounds/' + s + '.png'));
  // Pokemon front/back sprites
  for (let i = 1; i <= 32; i++) {
    const id = String(i).padStart(3, '0');
    loadImage('pkmn_front_' + id, base + 'assets/sprites/pokemon/front/' + id + '.png');
    loadImage('pkmn_back_' + id, base + 'assets/sprites/pokemon/back/' + id + '.png');
  }
  // Artwork for starters + pikachu
  ['001','004','007','025'].forEach(id => loadImage('pkmn_art_' + id, base + 'assets/sprites/pokemon/artwork/' + id + '.png'));
  // JSON data
  loadJSON(base + 'data/pokemon.json', d => { pokemonData = d; });
  loadJSON(base + 'data/moves.json', d => { movesData = d; });
  loadJSON(base + 'data/type_chart.json', d => { typeChart = d; });
}

// ============================================================
// === UTILITY DRAWING ===
// ============================================================
function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawRoundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawText(text, x, y, color, size, align) {
  ctx.fillStyle = color || COL.text;
  ctx.font = (size || 16) + 'px monospace';
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(text, x, y);
}

function drawTextShadow(text, x, y, color, size, align) {
  ctx.fillStyle = '#000';
  ctx.font = (size || 16) + 'px monospace';
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(text, x + 1, y + 1);
  ctx.fillStyle = color || COL.text;
  ctx.fillText(text, x, y);
}

// Fallback colored rect if image missing
function drawSprite(key, x, y, w, h, sx, sy, sw, sh) {
  const img = images[key];
  if (img) {
    if (sx !== undefined) {
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    } else {
      ctx.drawImage(img, x, y, w, h);
    }
  } else {
    // fallback
    ctx.fillStyle = '#FF00FF';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#000';
    ctx.font = '10px monospace';
    ctx.fillText(key.substring(0,8), x+2, y+10);
  }
}

// ============================================================
// === TITLE SCREEN ===
// ============================================================
const stars = [];
for (let i = 0; i < 60; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: 1 + Math.random() * 2,
    speed: 0.5 + Math.random() * 1.5,
    phase: Math.random() * Math.PI * 2
  });
}

let titleCursor = 0;
const titleMenu = ['NOUVELLE PARTIE', 'CONTINUER'];
let titleTime = 0;

function updateTitle(dt) {
  titleTime += dt;
  if (isUp()) titleCursor = (titleCursor - 1 + titleMenu.length) % titleMenu.length;
  if (isDown()) titleCursor = (titleCursor + 1) % titleMenu.length;
  if (isConfirm()) {
    if (titleCursor === 0) {
      gameState = 'STARTER_SELECT';
      starterCursor = 1;
    }
    // CONTINUER: no-op for demo
  }
}

function drawTitle(dt) {
  // Black background
  drawRect(0, 0, W, H, '#080810');
  // Stars
  stars.forEach(s => {
    const alpha = 0.3 + 0.7 * Math.abs(Math.sin(titleTime * s.speed + s.phase));
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
  // Pikachu artwork floating
  const pikaY = 60 + Math.sin(titleTime * 1.5) * 12;
  const art = images['pkmn_art_025'];
  if (art) {
    ctx.globalAlpha = 0.9;
    ctx.drawImage(art, W/2 - 70, pikaY, 140, 140);
    ctx.globalAlpha = 1;
  } else {
    drawRect(W/2 - 70, pikaY, 140, 140, '#F8D030');
    drawText('PIKACHU', W/2 - 35, pikaY + 60, '#000', 14);
  }
  // Title text
  drawTextShadow('POKEMON AMSO', W/2, 230, COL.gold, 36, 'center');
  drawText('Fan-game Godot 4.2 -- Gen 1-9 Battle Engine', W/2, 272, '#8888AA', 12, 'center');
  drawText('722 Moves | 310 Abilities | 151 Pokemon', W/2, 292, '#6666AA', 11, 'center');
  // Menu
  const menuY = 340;
  titleMenu.forEach((item, i) => {
    const col = i === titleCursor ? COL.gold : '#8888AA';
    const prefix = i === titleCursor ? (Math.sin(titleTime * 4) > 0 ? '> ' : '  ') : '  ';
    drawTextShadow(prefix + item, W/2, menuY + i * 32, col, 20, 'center');
  });
  // Footer
  drawText('Fleches/ZQSD: Naviguer | Entree: Confirmer', W/2, H - 30, '#555577', 10, 'center');
}

// ============================================================
// === STARTER SELECT ===
// ============================================================
let starterCursor = 1;
const starters = [
  { id: '001', name: 'Bulbizarre', type: 'Grass', type2: 'Poison' },
  { id: '004', name: 'Salameche', type: 'Fire', type2: null },
  { id: '007', name: 'Carapuce', type: 'Water', type2: null }
];
let starterConfirmed = false;
let starterTextTimer = 0;
let starterText = '';
let starterTextTarget = '';
let starterFadeOut = 0;
let starterTime = 0;

function updateStarterSelect(dt) {
  starterTime += dt;
  if (!starterConfirmed) {
    if (isLeft()) starterCursor = (starterCursor - 1 + 3) % 3;
    if (isRight()) starterCursor = (starterCursor + 1) % 3;
    if (isConfirm()) {
      starterConfirmed = true;
      starterTextTarget = 'Prof. Chen: Excellent choix! ' + starters[starterCursor].name + ' sera ton partenaire!';
      starterText = '';
      starterTextTimer = 0;
      // Create player's starter pokemon
      initPlayerStarter(starters[starterCursor].id);
    }
  } else {
    starterTextTimer += dt;
    const charIdx = Math.floor(starterTextTimer / 0.03);
    starterText = starterTextTarget.substring(0, Math.min(charIdx, starterTextTarget.length));
    if (starterText.length >= starterTextTarget.length && isConfirm()) {
      starterFadeOut += dt * 3;
      if (starterFadeOut >= 1) {
        gameState = 'OVERWORLD';
        initOverworld();
      }
    }
  }
}

function drawStarterSelect(dt) {
  drawRect(0, 0, W, H, '#181828');
  // Header
  drawTextShadow('Choisis ton Pokemon !', W/2, 20, COL.gold, 24, 'center');
  // 3 cards
  const cardW = 170, cardH = 300, gap = 20;
  const totalW = cardW * 3 + gap * 2;
  const startX = (W - totalW) / 2;
  const cardY = 60;
  starters.forEach((s, i) => {
    const x = startX + i * (cardW + gap);
    const selected = i === starterCursor;
    const bobY = selected ? Math.sin(starterTime * 3) * 4 : 0;
    // Card bg
    const cardColor = selected ? '#2A2A4A' : '#1A1A2A';
    const borderColor = selected ? COL.gold : COL.border;
    drawRoundRect(x, cardY + bobY, cardW, cardH, 8, cardColor, borderColor);
    // Artwork
    const artKey = 'pkmn_art_' + s.id;
    const artSize = 120;
    const artX = x + (cardW - artSize) / 2;
    const artY = cardY + 20 + bobY;
    if (images[artKey]) {
      ctx.drawImage(images[artKey], artX, artY, artSize, artSize);
    } else {
      drawRect(artX, artY, artSize, artSize, COL.types[s.type]);
      drawText('#' + s.id, artX + 30, artY + 50, '#FFF', 14);
    }
    // Name
    drawTextShadow(s.name, x + cardW/2, cardY + 160 + bobY, COL.text, 16, 'center');
    // Type badges
    const types = [s.type];
    if (s.type2) types.push(s.type2);
    types.forEach((t, ti) => {
      const bw = 70, bh = 22;
      const bx = x + cardW/2 - (types.length * (bw + 4)) / 2 + ti * (bw + 4);
      const by = cardY + 190 + bobY;
      drawRoundRect(bx, by, bw, bh, 4, COL.types[t], null);
      drawText(t.toUpperCase(), bx + bw/2, by + 4, '#FFF', 12, 'center');
    });
    // Selector arrow
    if (selected && !starterConfirmed) {
      const arrowAlpha = 0.5 + 0.5 * Math.sin(starterTime * 5);
      ctx.globalAlpha = arrowAlpha;
      drawText('v', x + cardW/2, cardY - 14 + bobY, COL.gold, 18, 'center');
      ctx.globalAlpha = 1;
    }
  });
  // Text box if confirmed
  if (starterConfirmed) {
    drawRoundRect(20, H - 90, W - 40, 70, 6, COL.panel, COL.border);
    drawText(starterText, 40, H - 78, COL.text, 16);
    if (starterText.length >= starterTextTarget.length) {
      const tri = Math.sin(starterTime * 5) > 0 ? 'v' : ' ';
      drawText(tri, W - 50, H - 40, COL.text, 14);
    }
  }
  // Fade out
  if (starterFadeOut > 0) {
    ctx.globalAlpha = Math.min(starterFadeOut, 1);
    drawRect(0, 0, W, H, '#000');
    ctx.globalAlpha = 1;
  }
  // Footer
  drawText('Gauche/Droite: Choisir | Entree: Confirmer', W/2, H - 16, '#555577', 10, 'center');
}

// ============================================================
// === PLAYER DATA ===
// ============================================================
let playerTeam = [];
let playerMoney = 3000;

function initPlayerStarter(pokemonId) {
  const pkmn = createPokemon(pokemonId, 5);
  playerTeam = [pkmn];
}

function createPokemon(id, level) {
  const data = pokemonData[id];
  if (!data) {
    // Fallback data if pokemon.json not loaded
    return createFallbackPokemon(id, level);
  }
  const stats = calcStats(data.base_stats, level);
  const moves = getMovesForLevel(data.levelup_moves, level);
  return {
    id: id,
    name: FR_NAMES[id] || data.name,
    engName: data.name,
    types: data.types,
    level: level,
    hp: stats.hp,
    maxHp: stats.hp,
    stats: stats,
    moves: moves,
    exp: 0,
    expToNext: Math.floor(Math.pow(level + 1, 3)),
    baseExpYield: data.base_exp_yield || 50
  };
}

function createFallbackPokemon(id, level) {
  const names = {
    '001':{n:'Bulbizarre',t:['Grass','Poison'],s:{hp:45,atk:49,def:49,sp_atk:65,sp_def:65,speed:45}},
    '004':{n:'Salameche',t:['Fire'],s:{hp:39,atk:52,def:43,sp_atk:60,sp_def:50,speed:65}},
    '007':{n:'Carapuce',t:['Water'],s:{hp:44,atk:48,def:65,sp_atk:50,sp_def:64,speed:43}},
    '010':{n:'Chenipan',t:['Bug'],s:{hp:45,atk:30,def:35,sp_atk:20,sp_def:20,speed:45}},
    '013':{n:'Aspicot',t:['Bug','Poison'],s:{hp:40,atk:35,def:30,sp_atk:20,sp_def:20,speed:50}},
    '014':{n:'Coconfort',t:['Bug','Poison'],s:{hp:45,atk:25,def:50,sp_atk:25,sp_def:25,speed:35}},
    '016':{n:'Roucool',t:['Normal','Flying'],s:{hp:40,atk:45,def:40,sp_atk:35,sp_def:35,speed:56}},
    '019':{n:'Rattata',t:['Normal'],s:{hp:30,atk:56,def:35,sp_atk:25,sp_def:35,speed:72}},
    '025':{n:'Pikachu',t:['Electric'],s:{hp:35,atk:55,def:40,sp_atk:50,sp_def:50,speed:90}},
    '032':{n:'Nidoran',t:['Poison'],s:{hp:46,atk:57,def:40,sp_atk:40,sp_def:40,speed:50}}
  };
  const info = names[id] || {n:'MissingNo',t:['Normal'],s:{hp:40,atk:40,def:40,sp_atk:40,sp_def:40,speed:40}};
  const stats = calcStats(info.s, level);
  const defaultMoves = [
    {id:'tackle', name:'Charge', type:'Normal', category:'physical', power:40, accuracy:100, pp:35, maxPp:35}
  ];
  return {
    id, name: info.n, engName: info.n, types: info.t,
    level, hp: stats.hp, maxHp: stats.hp, stats,
    moves: defaultMoves, exp: 0, expToNext: Math.floor(Math.pow(level+1,3)),
    baseExpYield: 50
  };
}

function calcStats(base, level) {
  const iv = 15; // Fixed IVs for simplicity
  const calcHP = Math.floor((2 * base.hp + iv) * level / 100 + level + 10);
  const calcStat = (b) => Math.floor((2 * b + iv) * level / 100 + 5);
  return {
    hp: calcHP,
    atk: calcStat(base.atk),
    def: calcStat(base.def),
    sp_atk: calcStat(base.sp_atk),
    sp_def: calcStat(base.sp_def),
    speed: calcStat(base.speed)
  };
}

function getMovesForLevel(levelupMoves, level) {
  if (!levelupMoves) return [{id:'tackle',name:'Charge',type:'Normal',category:'physical',power:40,accuracy:100,pp:35,maxPp:35}];
  const available = levelupMoves.filter(m => m.level <= level);
  // Take the last 4 (most recent moves)
  const selected = available.slice(-4);
  return selected.map(m => {
    const md = movesData[m.move];
    if (md) {
      return {
        id: m.move, name: FR_MOVES[m.move] || md.name,
        type: md.type, category: md.category,
        power: md.power, accuracy: md.accuracy,
        pp: md.pp, maxPp: md.pp
      };
    }
    return {
      id: m.move, name: FR_MOVES[m.move] || m.move,
      type: 'Normal', category: 'physical',
      power: 40, accuracy: 100, pp: 35, maxPp: 35
    };
  });
}

// === MAP 2: ROUTE 1 (20x25) ===
const map2Data = (() => {
  const m = [];
  for (let y = 0; y < 25; y++) {
    const row = [];
    for (let x = 0; x < 20; x++) {
      if (x === 0 || x === 19) { row.push(2); continue; }
      // Path down the middle, winding
      const pathCenter = 9 + Math.floor(Math.sin(y * 0.4) * 2);
      if (Math.abs(x - pathCenter) <= 1) { row.push(1); continue; }
      // Tall grass patches
      if ((y >= 3 && y <= 6 && x >= 3 && x <= 6) ||
          (y >= 9 && y <= 12 && x >= 13 && x <= 16) ||
          (y >= 15 && y <= 18 && x >= 4 && x <= 7) ||
          (y >= 19 && y <= 22 && x >= 12 && x <= 15)) {
        row.push(4); continue;
      }
      // Some trees near edges
      if (x === 1 || x === 18) { row.push(Math.random() > 0.4 ? 2 : 0); continue; }
      row.push(0);
    }
    m.push(row);
  }
  // Exits - clear top and bottom
  m[0][9] = 1; m[0][10] = 1;

                     (y >= 16 && y <= 18 && x >= 9 && x <= 14) ||
                     (Math.abs(x - 9) <= 1 && y >= 17);

      // Tall grass scattered

      if (Math.random() > 0.35) { row.push(2); continue; }
      row.push(0);
    }
    m.push(row);
  }
  return m;
})();

// ============================================================
let currentMapIdx = 0;
let currentMap = null;

// Player overworld state
const player = {
  x: 9, y: 12, // tile position
  px: 0, py: 0, // pixel position (for smooth movement)
  dir: 0, // 0=down, 1=left, 2=right, 3=up
  frame: 0,
  moving: false,
  moveTimer: 0,
  startX: 0, startY: 0,
  targetX: 0, targetY: 0,
  animTimer: 0,
  walkCycle: 0 // 0,1,0,2 pattern
};

// Camera
const camera = { x: 0, y: 0 };

// Dialogue
let dialogueActive = false;
let dialogueLines = [];
let dialogueLineIdx = 0;
let dialogueText = '';
let dialogueCharIdx = 0;
let dialogueTimer = 0;
let dialogueCallback = null;

// Location banner
let bannerText = '';
let bannerTimer = 0;
const BANNER_DURATION = 2.5;

// Fade transition
let fadeAlpha = 0;
let fadeDir = 0; // 1=fading out, -1=fading in, 0=none
let fadeCallback = null;
const FADE_SPEED = 2.5;

// Trainer approach
let trainerApproaching = null;
let trainerApproachTimer = 0;
let exclamationTimer = 0;

// Battle transition
let battleTransTimer = 0;
let battleTransActive = false;

// Overworld time
let owTime = 0;

function initOverworld() {
  currentMapIdx = 0;
  currentMap = maps[currentMapIdx];
  player.x = 9; player.y = 12;
  player.px = player.x * TILE; player.py = player.y * TILE;
  player.dir = 3; // face up
  player.moving = false;
  fadeAlpha = 1;
  fadeDir = -1;
  bannerText = currentMap.name;
  bannerTimer = BANNER_DURATION;
  dialogueActive = false;
  // Update Prof Oak dialogue with chosen starter name
  const starterName = playerTeam.length > 0 ? playerTeam[0].name : 'jeune dresseur';
  for (const npc of currentMap.npcs) {
    if (npc.dynamic && npc.sprite === 'ow_prof_oak') {
      npc.dialogue = ['Ah, ' + starterName + ' est un excellent choix!', 'Le monde des Pokemon est vaste!', 'Explore la Route 1 au nord!'];
    }
  }
}

function changeMap(mapIdx, toX, toY) {
  fadeDir = 1;
  fadeCallback = () => {
    currentMapIdx = mapIdx;
    currentMap = maps[currentMapIdx];
    player.x = toX; player.y = toY;
    player.px = player.x * TILE; player.py = player.y * TILE;
    player.moving = false;
    fadeDir = -1;
    fadeCallback = null;
    bannerText = currentMap.name;
    bannerTimer = BANNER_DURATION;
  };
}

function startDialogue(lines, callback) {
  dialogueActive = true;
  dialogueLines = lines;
  dialogueLineIdx = 0;
  dialogueCharIdx = 0;
  dialogueText = '';
  dialogueTimer = 0;
  dialogueCallback = callback || null;
}

function updateDialogue(dt) {
  if (!dialogueActive) return;
  dialogueTimer += dt;
  const target = dialogueLines[dialogueLineIdx];
  if (dialogueCharIdx < target.length) {
    if (dialogueTimer >= 0.03) {
      dialogueTimer -= 0.03;
      dialogueCharIdx++;
      dialogueText = target.substring(0, dialogueCharIdx);
    }
    if (isConfirm()) {
      dialogueCharIdx = target.length;
      dialogueText = target;
    }
  } else {
    if (isConfirm()) {
      dialogueLineIdx++;
      if (dialogueLineIdx >= dialogueLines.length) {
        dialogueActive = false;
        if (dialogueCallback) dialogueCallback();
      } else {
        dialogueCharIdx = 0;
        dialogueText = '';
        dialogueTimer = 0;
      }
    }
  }
}

function getTile(x, y) {
  if (!currentMap) return 12;
  if (x < 0 || x >= currentMap.w || y < 0 || y >= currentMap.h) return 12;
  return currentMap.data[y][x];
}

function isWalkable(x, y) {
  const tile = getTile(x, y);
  if (!TILE_WALKABLE[tile]) return false;
  // Check NPCs
  for (const npc of currentMap.npcs) {
    if (npc.x === x && npc.y === y) return false;
  }
  for (const t of currentMap.trainers) {
    if (t.x === x && t.y === y) return false;
  }
  return true;
}

function checkExits() {
  for (const exit of currentMap.exits) {
    if (player.x >= exit.x1 && player.x <= exit.x2 && player.y === exit.y) {
      changeMap(exit.toMap, exit.toX, exit.toY);
      return true;
    }
  }
  return false;
}

function checkTallGrass() {
  const tile = getTile(player.x, player.y);
  if (TILE_GRASS[tile] && currentMap.encounters && currentMap.encounters.length > 0) {
    if (Math.random() < 0.14) {
      startWildBattle();
      return true;
    }
  }
  return false;
}

function checkTrainerSight() {
  for (const t of currentMap.trainers) {
    if (t.defeated) continue;
    const dx = [0, -1, 1, 0]; // dir: down, left, right, up
    const dy = [1, 0, 0, -1];
    for (let i = 1; i <= t.sight; i++) {
      const sx = t.x + dx[t.dir] * i;
      const sy = t.y + dy[t.dir] * i;
      if (sx === player.x && sy === player.y) {
        trainerApproaching = t;
        exclamationTimer = 0.8;
        return true;
      }
    }
  }
  return false;
}

function faceNPCsToPlayer() {
  const allNpcs = [...currentMap.npcs, ...currentMap.trainers];
  for (const npc of allNpcs) {
    const dx = player.x - npc.x;
    const dy = player.y - npc.y;
    const dist = Math.abs(dx) + Math.abs(dy);
    if (dist <= 2) {
      if (Math.abs(dx) > Math.abs(dy)) {
        npc.dir = dx > 0 ? 2 : 1;
      } else {
        npc.dir = dy > 0 ? 0 : 3;
      }
    }
  }
}

function interactFacing() {
  const dx = [0, -1, 1, 0];
  const dy = [1, 0, 0, -1];
  const fx = player.x + dx[player.dir];
  const fy = player.y + dy[player.dir];
  // Check NPCs
  for (const npc of currentMap.npcs) {
    if (npc.x === fx && npc.y === fy) {
      // Face the player
      if (player.dir === 0) npc.dir = 3;
      else if (player.dir === 1) npc.dir = 2;
      else if (player.dir === 2) npc.dir = 1;
      else npc.dir = 0;
      startDialogue(npc.dialogue);
      return true;
    }
  }
  // Check trainers
  for (const t of currentMap.trainers) {
    if (t.x === fx && t.y === fy) {
      if (t.dir === 0) t.dir = 3;
      else if (t.dir === 1) t.dir = 2;
      else if (t.dir === 2) t.dir = 1;
      else t.dir = 0;
      if (t.defeated) {
        startDialogue(t.afterDialogue);
      } else {
        startDialogue(t.dialogue, () => { startTrainerBattle(t); });
      }
      return true;
    }
  }
  // Check sign
  const tile = getTile(fx, fy);
  if (tile === 11) {
    startDialogue([currentMap.name + ' - Un endroit paisible.']);
    return true;
  }
  return false;
}

function updateOverworld(dt) {
  owTime += dt;

  // Fade
  if (fadeDir !== 0) {
    fadeAlpha += fadeDir * FADE_SPEED * dt;
    if (fadeDir === 1 && fadeAlpha >= 1) {
      fadeAlpha = 1;
      fadeDir = 0;
      if (fadeCallback) fadeCallback();
    }
    if (fadeDir === -1 && fadeAlpha <= 0) {
      fadeAlpha = 0;
      fadeDir = 0;
    }
    return;
  }

  // Battle transition
  if (battleTransActive) {
    battleTransTimer += dt;
    if (battleTransTimer >= 1.2) {
      battleTransActive = false;
      gameState = 'BATTLE';
    }
    return;
  }

  // Banner
  if (bannerTimer > 0) bannerTimer -= dt;

  // Trainer approaching
  if (trainerApproaching) {
    if (exclamationTimer > 0) {
      exclamationTimer -= dt;
      return;
    }
    // Move trainer towards player
    trainerApproachTimer += dt;
    if (trainerApproachTimer >= 0.3) {
      trainerApproachTimer = 0;
      const t = trainerApproaching;
      const dx = Math.sign(player.x - t.x);
      const dy = Math.sign(player.y - t.y);
      const dist = Math.abs(player.x - t.x) + Math.abs(player.y - t.y);
      if (dist > 1) {
        if (Math.abs(player.x - t.x) > Math.abs(player.y - t.y)) {
          t.x += dx;
          t.dir = dx > 0 ? 2 : 1;
        } else {
          t.y += dy;
          t.dir = dy > 0 ? 0 : 3;
        }
      } else {
        // Face player
        if (player.dir === 0) t.dir = 3;
        else if (player.dir === 1) t.dir = 2;
        else if (player.dir === 2) t.dir = 1;
        else t.dir = 0;
        const trainer = trainerApproaching;
        trainerApproaching = null;
        trainerApproachTimer = 0;
        startDialogue(trainer.dialogue, () => { startTrainerBattle(trainer); });
      }
    }
    return;
  }

  // Dialogue
  if (dialogueActive) {
    updateDialogue(dt);
    return;
  }

  // Player movement
  if (player.moving) {
    player.moveTimer += dt;
    const progress = Math.min(player.moveTimer / 0.125, 1); // 8 frames at 60fps = 0.133s
    player.px = player.startX + (player.targetX - player.startX) * progress;
    player.py = player.startY + (player.targetY - player.startY) * progress;
    // Walk animation
    player.animTimer += dt;
    if (player.animTimer >= 0.15) {
      player.animTimer -= 0.15;
      player.walkCycle = (player.walkCycle + 1) % 4;
      // pattern: 0,1,0,2
      const frames = [0, 1, 0, 2];
      player.frame = frames[player.walkCycle];
    }
    if (progress >= 1) {
      player.x = Math.round(player.targetX / TILE);
      player.y = Math.round(player.targetY / TILE);
      player.px = player.x * TILE;
      player.py = player.y * TILE;
      player.moving = false;
      player.frame = 0;
      // Check exits
      if (checkExits()) return;
      // Check tall grass
      if (checkTallGrass()) return;
      // Check trainer sight
      if (checkTrainerSight()) return;
      // Face nearby NPCs
      faceNPCsToPlayer();
    }
  } else {
    // Process input
    let dx = 0, dy = 0, newDir = player.dir;
    if (isHeldUp()) { dy = -1; newDir = 3; }
    else if (isHeldDown()) { dy = 1; newDir = 0; }
    else if (isHeldLeft()) { dx = -1; newDir = 1; }
    else if (isHeldRight()) { dx = 1; newDir = 2; }
    player.dir = newDir;
    if ((dx !== 0 || dy !== 0) && isWalkable(player.x + dx, player.y + dy)) {
      player.moving = true;
      player.moveTimer = 0;
      player.startX = player.x * TILE;
      player.startY = player.y * TILE;
      player.targetX = (player.x + dx) * TILE;
      player.targetY = (player.y + dy) * TILE;
      player.animTimer = 0;
      player.walkCycle = 0;
    }
    // Interact
    if (isConfirm() && !player.moving) {
      interactFacing();
    }
  }
}

function drawTile(tileType, x, y) {
  // Draw tile based on type using colors as fallback
  const colors = {
    0: '#4D8F38', 1: '#998055', 2: '#2E6619', 3: '#1F87E6',
    4: '#3B7A28', 5: '#BFB8AD', 6: '#C62828', 7: '#1565C0',
    8: '#8D6E3C', 9: '#8D6E3C', 10: '#E8A0E8', 11: '#B0A080',
    12: '#000000', 13: '#795548', 14: '#C8A870'
  };

  const px = x * TILE * 2;
  const py = y * TILE * 2;
  const s = TILE * 2;

  // Try to use tileset
  const tsKey = currentMap ? currentMap.tileset : 'tileset_grass';
  const ts = images[tsKey];

  if (ts) {
    // Map tile types to tileset positions (row, col in 16x16 grid)
    // Tileset is 256x256, each tile is 16x16
    let tsX = 0, tsY = 0;
    switch (tileType) {
      case 0: tsX = 0; tsY = 0; break; // grass
      case 1: tsX = 4 * 16; tsY = 0; break; // path
      case 2: tsX = 0; tsY = 2 * 16; break; // tree
      case 3: tsX = 0; tsY = 1 * 16; break; // water
      case 4: tsX = 6 * 16; tsY = 1 * 16; break; // tall grass
      case 5: tsX = 0; tsY = 5 * 16; break; // building wall
      case 6: tsX = 0; tsY = 6 * 16; break; // roof red (pokecenter)
      case 7: tsX = 4 * 16; tsY = 6 * 16; break; // roof blue (pokemart)
      case 8: tsX = 0; tsY = 11 * 16; break; // door
      case 9: tsX = 7 * 16; tsY = 3 * 16; break; // fence
      case 10: tsX = 3 * 16; tsY = 3 * 16; break; // flower
      case 11: tsX = 11 * 16; tsY = 1 * 16; break; // sign
      case 12: tsX = 14 * 16; tsY = 0; break; // black
      case 13: tsX = 0; tsY = 4 * 16; break; // brown roof
      case 14: tsX = 0; tsY = 10 * 16; break; // wood floor
      default: tsX = 0; tsY = 0;
    }
    ctx.drawImage(ts, tsX, tsY, 16, 16, px - camera.x, py - camera.y, s, s);
  } else {
    // Color fallback
    ctx.fillStyle = colors[tileType] || '#FF00FF';
    ctx.fillRect(px - camera.x, py - camera.y, s, s);
    // Add details
    if (tileType === 2) {
      // Tree: draw circle for canopy
      ctx.fillStyle = '#1A5C0F';
      const cx = px - camera.x + s/2;
      const cy = py - camera.y + s * 0.35;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.4, 0, Math.PI * 2);
      ctx.fill();
      // Trunk
      ctx.fillStyle = '#594026';
      ctx.fillRect(cx - 3, cy + s * 0.2, 6, s * 0.3);
    }
    if (tileType === 4) {
      // Tall grass details
      ctx.fillStyle = '#2E6619';
      for (let i = 0; i < 4; i++) {
        const gx = px - camera.x + 4 + i * 7;
        const gy = py - camera.y + s - 8;
        ctx.fillRect(gx, gy, 2, 8);
        ctx.fillRect(gx - 2, gy, 2, 5);
        ctx.fillRect(gx + 2, gy, 2, 5);
      }
    }
    if (tileType === 6) {
      // PokeCenter roof: red with white cross
      ctx.fillStyle = '#FFF';
      ctx.fillRect(px - camera.x + s/2 - 4, py - camera.y + s/2 - 1, 8, 3);
      ctx.fillRect(px - camera.x + s/2 - 1, py - camera.y + s/2 - 4, 3, 8);
    }
    if (tileType === 7) {
      // PokeMart roof: blue with P
      ctx.fillStyle = '#FFF';
      ctx.font = '14px monospace';
      ctx.fillText('P', px - camera.x + s/2 - 4, py - camera.y + s/2 + 4);
    }
    if (tileType === 8) {
      // Door
      ctx.fillStyle = '#5C3A1E';
      ctx.fillRect(px - camera.x + 6, py - camera.y + 4, s - 12, s - 4);
      ctx.fillStyle = '#F5CC38';
      ctx.fillRect(px - camera.x + s - 12, py - camera.y + s/2, 3, 3);
    }
    if (tileType === 11) {
      // Sign
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(px - camera.x + 8, py - camera.y + 4, s - 16, s - 12);
      ctx.fillStyle = '#594026';
      ctx.fillRect(px - camera.x + s/2 - 2, py - camera.y + s - 10, 4, 10);
    }
    if (tileType === 10) {
      // Flower
      ctx.fillStyle = '#4D8F38';
      ctx.fillRect(px - camera.x, py - camera.y, s, s);
      const cols = ['#FF6B6B', '#FFD93D', '#FF9FF3', '#FFF'];
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = cols[i % cols.length];
        ctx.fillRect(px - camera.x + 6 + i * 8, py - camera.y + 10 + (i % 2) * 6, 4, 4);
      }
    }
  }
}

function drawOWSprite(key, x, y, dir, frame) {
  // Sprite sheet: 48x128, 3 cols x 4 rows, each frame 16x32
  // Rows: 0=down, 1=left, 2=right, 3=up
  const img = images[key];
  const drawW = 16 * 2;
  const drawH = 32 * 2;
  const drawX = x * TILE * 2 - camera.x;
  const drawY = y * TILE * 2 - camera.y - TILE * 2; // Sprite is 32 tall, tile is 16, so offset by 16

  if (img) {
    const sx = frame * 16;
    const sy = dir * 32;
    ctx.drawImage(img, sx, sy, 16, 32, drawX, drawY, drawW, drawH);
  } else {
    // Fallback: colored rectangle
    const spriteColors = {
      'ow_player': '#E53935', 'ow_rival': '#1E88E5', 'ow_nurse': '#F48FB1',
      'ow_shopkeeper': '#4CAF50', 'ow_youngster': '#42A5F5', 'ow_lass': '#EF5350',
      'ow_bug_catcher': '#8BC34A', 'ow_prof_oak': '#9E9E9E'
    };
    const col = spriteColors[key] || '#FF00FF';
    // Body
    ctx.fillStyle = '#1E1A28';
    ctx.fillRect(drawX + 4, drawY + 2, drawW - 8, drawH - 2);
    // Head
    ctx.fillStyle = '#E8C8A0';
    ctx.fillRect(drawX + 8, drawY + 6, drawW - 16, 14);
    // Hat/hair
    ctx.fillStyle = col;
    ctx.fillRect(drawX + 6, drawY + 2, drawW - 12, 8);
    // Torso
    ctx.fillStyle = col;
    ctx.fillRect(drawX + 6, drawY + 20, drawW - 12, 18);
    // Legs
    ctx.fillStyle = '#1565C0';
    ctx.fillRect(drawX + 8, drawY + 38, 6, 18);
    ctx.fillRect(drawX + drawW - 14, drawY + 38, 6, 18);
    // Eyes
    ctx.fillStyle = '#000';
    if (dir === 0) { // down - show eyes
      ctx.fillRect(drawX + 10, drawY + 12, 3, 3);
      ctx.fillRect(drawX + drawW - 13, drawY + 12, 3, 3);
    } else if (dir === 3) { // up - show back of head
      ctx.fillStyle = col;
      ctx.fillRect(drawX + 8, drawY + 8, drawW - 16, 10);
    }
  }
}

function drawOverworld(dt) {
  if (!currentMap) return;

  // Update camera
  const mapPxW = currentMap.w * TILE * 2;
  const mapPxH = currentMap.h * TILE * 2;
  camera.x = player.px * 2 + TILE - W / 2;
  camera.y = player.py * 2 + TILE - H / 2;
  // Clamp camera
  camera.x = Math.max(0, Math.min(camera.x, mapPxW - W));
  camera.y = Math.max(0, Math.min(camera.y, mapPxH - H));
  if (mapPxW <= W) camera.x = (mapPxW - W) / 2;
  if (mapPxH <= H) camera.y = (mapPxH - H) / 2;

  // Forest tint
  const isForest = currentMapIdx === 2;

  // Draw tiles
  const startTX = Math.max(0, Math.floor(camera.x / (TILE * 2)));
  const startTY = Math.max(0, Math.floor(camera.y / (TILE * 2)));
  const endTX = Math.min(currentMap.w - 1, Math.ceil((camera.x + W) / (TILE * 2)));
  const endTY = Math.min(currentMap.h - 1, Math.ceil((camera.y + H) / (TILE * 2)));

  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      drawTile(currentMap.data[ty][tx], tx, ty);
    }
  }

  // Collect entities to draw sorted by Y
  const entities = [];
  // Player
  entities.push({ y: player.py, type: 'player' });
  // NPCs
  currentMap.npcs.forEach(npc => {
    entities.push({ y: npc.y * TILE, type: 'npc', data: npc });
  });
  // Trainers
  currentMap.trainers.forEach(t => {
    entities.push({ y: t.y * TILE, type: 'trainer', data: t });
  });
  // Sort by y
  entities.sort((a, b) => a.y - b.y);

  // Draw entities
  entities.forEach(e => {
    if (e.type === 'player') {
      drawOWSprite('ow_player', player.px / TILE, player.py / TILE, player.dir, player.frame);
    } else {
      const d = e.data;
      drawOWSprite(d.sprite, d.x, d.y, d.dir, 0);
    }
  });

  // Exclamation mark for trainer
  if (trainerApproaching && exclamationTimer > 0) {
    const t = trainerApproaching;
    const ex = t.x * TILE * 2 - camera.x + 8;
    const ey = t.y * TILE * 2 - camera.y - TILE * 2 - 10;
    drawTextShadow('!', ex, ey, '#FF0000', 28, 'center');
  }

  // Forest overlay tint
  if (isForest) {
    ctx.fillStyle = 'rgba(0, 40, 10, 0.25)';
    ctx.fillRect(0, 0, W, H);
  }

  // Tall grass overlay (draw on top of player when in tall grass)
  const playerTile = getTile(player.x, player.y);
  if (TILE_GRASS[playerTile]) {
    const gx = player.px * 2 - camera.x;
    const gy = player.py * 2 - camera.y;
    // Draw grass blades on top
    ctx.fillStyle = isForest ? '#1A5C0F' : '#2E6619';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(gx + 4 + i * 7, gy + 20, 3, 12);
    }
  }

  // Location banner
  if (bannerTimer > 0) {
    const slideIn = Math.min(1, (BANNER_DURATION - bannerTimer) / 0.3);
    const slideOut = Math.min(1, bannerTimer / 0.3);
    const alpha = Math.min(slideIn, slideOut);
    const bannerY = -30 + slideIn * 30;
    ctx.globalAlpha = alpha;
    drawRoundRect(W/2 - 120, bannerY, 240, 36, 6, 'rgba(0,0,0,0.7)', null);
    drawTextShadow(bannerText, W/2, bannerY + 8, COL.gold, 18, 'center');
    ctx.globalAlpha = 1;
  }

  // Dialogue box
  if (dialogueActive) {
    drawRoundRect(10, H - 100, W - 20, 80, 8, COL.panel, COL.border);
    drawText(dialogueText, 30, H - 88, COL.text, 16);
    // Blink indicator
    if (dialogueCharIdx >= dialogueLines[dialogueLineIdx].length) {
      if (Math.sin(owTime * 5) > 0) {
        drawText('v', W - 40, H - 40, COL.text, 14);
      }
    }
  }

  // Battle transition animation
  if (battleTransActive) {
    const t = battleTransTimer;
    // Phase 1: 3 white flashes (0-0.5s)
    if (t < 0.5) {
      const flashIdx = Math.floor(t / 0.167);
      if (flashIdx % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillRect(0, 0, W, H);
      }
    }
    // Phase 2: horizontal stripes close (0.5-1.2s)
    if (t >= 0.5) {
      const stripeProg = Math.min(1, (t - 0.5) / 0.7);
      ctx.fillStyle = '#000';
      const numStripes = 6;
      const stripeH = H / numStripes;
      for (let i = 0; i < numStripes; i++) {
        const fromLeft = i % 2 === 0;
        const sx = fromLeft ? -W * (1 - stripeProg) : W * (1 - stripeProg);
        ctx.fillRect(sx, i * stripeH, W, stripeH);
      }
    }
  }

  // Fade overlay
  if (fadeAlpha > 0) {
    ctx.globalAlpha = fadeAlpha;
    drawRect(0, 0, W, H, '#000');
    ctx.globalAlpha = 1;
  }
}

// === BATTLE SYSTEM ===
// ============================================================
let battle = null;

function startWildBattle() {
  const enc = currentMap.encounters;
  if (!enc || enc.length === 0) return;
  // Weighted random
  const totalWeight = enc.reduce((s, e) => s + e.weight, 0);
  let r = Math.random() * totalWeight;
  let chosen = enc[0];
  for (const e of enc) {
    r -= e.weight;
    if (r <= 0) { chosen = e; break; }
  }
  const level = chosen.minLv + Math.floor(Math.random() * (chosen.maxLv - chosen.minLv + 1));
  const wildPkmn = createPokemon(chosen.id, level);

  initBattle(wildPkmn, false, null);
}

function startTrainerBattle(trainer) {
  const team = trainer.team.map(t => createPokemon(t.id, t.level));
  initBattle(team[0], true, { trainer: trainer, team: team, currentIdx: 0 });
}

function initBattle(enemy, isTrainer, trainerData) {
  const playerPkmn = playerTeam[0];
  // Restore a bit of HP for demo playability
  if (playerPkmn.hp <= 0) {
    playerPkmn.hp = playerPkmn.maxHp;
    playerPkmn.moves.forEach(m => m.pp = m.maxPp);
  }
  battle = {
    player: playerPkmn,
    enemy: enemy,
    isTrainer: isTrainer,
    trainerData: trainerData,
    state: 'INTRO', // INTRO, ACTION, MOVE_SELECT, TURN_EXEC, MESSAGE, ANIM, ENEMY_KO, PLAYER_KO, WIN, LOSE, FLEE, EXP
    timer: 0,
    // Slide-in positions (in logical pixels, drawn at 2x)
    playerSlideX: -96,
    enemySlideX: 320,
    playerTargetX: 40,
    enemyTargetX: 190,
    // Idle bobbing
    bobTimer: 0,
    // HP bar animation
    playerHpDisplay: playerPkmn.hp,
    enemyHpDisplay: enemy.hp,
    playerHpTarget: playerPkmn.hp,
    enemyHpTarget: enemy.hp,
    // Action menu
    actionCursor: 0,
    moveCursor: 0,
    // Messages
    messages: [],
    messageIdx: 0,
    messageCharIdx: 0,
    messageText: '',
    messageTimer: 0,
    messageCallback: null,
    // Animation
    animType: null,
    animTimer: 0,
    animData: {},
    // Turn queue
    turnQueue: [],
    turnIdx: 0,
    // EXP
    expGained: 0,
    expBarDisplay: playerPkmn.exp,
    bgType: currentMap ? currentMap.bgType : 'grass',
    // Screen effects
    screenShake: 0,
    flashColor: null,
    flashTimer: 0,
    // KO anim
    koTarget: null,
    koTimer: 0
  };
  battleTransActive = true;
  battleTransTimer = 0;
}

function showBattleMessage(msgs, callback) {
  if (typeof msgs === 'string') msgs = [msgs];
  battle.messages = msgs;
  battle.messageIdx = 0;
  battle.messageCharIdx = 0;
  battle.messageText = '';
  battle.messageTimer = 0;
  battle.messageCallback = callback;
  battle.state = 'MESSAGE';
}

function updateBattle(dt) {
  if (!battle) return;
  battle.timer += dt;
  battle.bobTimer += dt;

  // HP bar smooth interpolation
  const hpSpeed = dt * 80; // HP per second
  if (battle.playerHpDisplay !== battle.playerHpTarget) {
    if (battle.playerHpDisplay > battle.playerHpTarget) {
      battle.playerHpDisplay = Math.max(battle.playerHpTarget, battle.playerHpDisplay - hpSpeed);
    } else {
      battle.playerHpDisplay = Math.min(battle.playerHpTarget, battle.playerHpDisplay + hpSpeed);
    }
  }
  if (battle.enemyHpDisplay !== battle.enemyHpTarget) {
    if (battle.enemyHpDisplay > battle.enemyHpTarget) {
      battle.enemyHpDisplay = Math.max(battle.enemyHpTarget, battle.enemyHpDisplay - hpSpeed);
    } else {
      battle.enemyHpDisplay = Math.min(battle.enemyHpTarget, battle.enemyHpDisplay + hpSpeed);
    }
  }

  // Screen shake
  if (battle.screenShake > 0) battle.screenShake -= dt;
  if (battle.flashTimer > 0) battle.flashTimer -= dt;

  switch (battle.state) {
    case 'INTRO':
      updateBattleIntro(dt);
      break;
    case 'ACTION':
      updateBattleAction(dt);
      break;
    case 'MOVE_SELECT':
      updateBattleMoveSelect(dt);
      break;
    case 'MESSAGE':
      updateBattleMessage(dt);
      break;
    case 'TURN_EXEC':
      updateBattleTurnExec(dt);
      break;
    case 'ANIM':
      updateBattleAnim(dt);
      break;
    case 'ENEMY_KO':
      updateEnemyKO(dt);
      break;
    case 'PLAYER_KO':
      updatePlayerKO(dt);
      break;
    case 'EXP':
      updateBattleExp(dt);
      break;
    case 'WIN':
    case 'LOSE':
    case 'FLEE':
      break;
  }
}

function updateBattleIntro(dt) {
  // Slide sprites in
  const speed = 300;
  if (battle.playerSlideX < battle.playerTargetX) {
    battle.playerSlideX = Math.min(battle.playerTargetX, battle.playerSlideX + speed * dt);
  }
  if (battle.enemySlideX > battle.enemyTargetX) {
    battle.enemySlideX = Math.max(battle.enemyTargetX, battle.enemySlideX - speed * dt);
  }
  if (battle.playerSlideX >= battle.playerTargetX && battle.enemySlideX <= battle.enemyTargetX) {
    const name = battle.enemy.name;
    if (battle.isTrainer) {
      showBattleMessage(battle.trainerData.trainer.name + ' envoie ' + name + '!', () => {
        battle.state = 'ACTION';
      });
    } else {
      showBattleMessage('Un ' + name + ' sauvage apparait!', () => {
        battle.state = 'ACTION';
      });
    }
  }
}

function updateBattleAction(dt) {
  if (isUp()) battle.actionCursor = battle.actionCursor < 2 ? battle.actionCursor : battle.actionCursor - 2;
  if (isDown()) battle.actionCursor = battle.actionCursor >= 2 ? battle.actionCursor : battle.actionCursor + 2;
  if (isLeft()) battle.actionCursor = battle.actionCursor % 2 === 0 ? battle.actionCursor : battle.actionCursor - 1;
  if (isRight()) battle.actionCursor = battle.actionCursor % 2 === 1 ? battle.actionCursor : battle.actionCursor + 1;
  battle.actionCursor = Math.max(0, Math.min(3, battle.actionCursor));

  if (isConfirm()) {
    switch (battle.actionCursor) {
      case 0: // ATTAQUE
        battle.state = 'MOVE_SELECT';
        battle.moveCursor = 0;
        break;
      case 1: // SAC
        showBattleMessage('Le sac est vide!', () => { battle.state = 'ACTION'; });
        break;
      case 2: // POKEMON
        showBattleMessage('Tu n\'as qu\'un Pokemon!', () => { battle.state = 'ACTION'; });
        break;
      case 3: // FUITE
        if (!battle.isTrainer) {
          showBattleMessage('Fuite reussie!', () => {
            battle.state = 'FLEE';
            endBattle(false);
          });
        } else {
          showBattleMessage('Impossible de fuir un combat de dresseur!', () => { battle.state = 'ACTION'; });
        }
        break;
    }
  }
}

function updateBattleMoveSelect(dt) {
  const numMoves = battle.player.moves.length;
  if (isUp()) battle.moveCursor = Math.max(0, battle.moveCursor - 1);
  if (isDown()) battle.moveCursor = Math.min(numMoves - 1, battle.moveCursor + 1);
  if (isCancel()) { battle.state = 'ACTION'; return; }
  if (isConfirm()) {
    const move = battle.player.moves[battle.moveCursor];
    if (move.pp <= 0) {
      showBattleMessage('Plus de PP pour cette attaque!', () => { battle.state = 'MOVE_SELECT'; });
      return;
    }
    // Determine turn order
    const playerMove = { ...move };
    const enemyMove = chooseEnemyMove();
    battle.turnQueue = [];

    const playerSpeed = battle.player.stats.speed;
    const enemySpeed = battle.enemy.stats.speed;
    const playerPriority = playerMove.priority || 0;
    const enemyPriority = (enemyMove && enemyMove.priority) || 0;

    if (playerPriority > enemyPriority || (playerPriority === enemyPriority && playerSpeed >= enemySpeed)) {
      battle.turnQueue.push({ attacker: 'player', move: playerMove });
      if (enemyMove) battle.turnQueue.push({ attacker: 'enemy', move: enemyMove });
    } else {
      if (enemyMove) battle.turnQueue.push({ attacker: 'enemy', move: enemyMove });
      battle.turnQueue.push({ attacker: 'player', move: playerMove });
    }
    battle.turnIdx = 0;
    battle.state = 'TURN_EXEC';
    executeTurn();
  }
}

function chooseEnemyMove() {
  const moves = battle.enemy.moves.filter(m => m.pp > 0);
  if (moves.length === 0) {
    return { id: 'struggle', name: 'Lutte', type: 'Normal', category: 'physical', power: 50, accuracy: 100, pp: 99, maxPp: 99 };
  }
  // Score moves
  const scored = moves.map(m => {
    let score = m.power || 1;
    const eff = getEffectiveness(m.type, battle.player.types);
    score *= eff;
    if (battle.enemy.types.includes(m.type)) score *= 1.5; // STAB
    score += Math.random() * 10;
    return { move: m, score };
  });
  scored.sort((a, b) => b.score - a.score);
  // 70% best, 30% random
  return Math.random() < 0.7 ? scored[0].move : scored[Math.floor(Math.random() * scored.length)].move;
}

function executeTurn() {
  if (battle.turnIdx >= battle.turnQueue.length) {
    // All turns done, check KO
    if (battle.enemy.hp <= 0) {
      battle.state = 'ENEMY_KO';
      battle.koTarget = 'enemy';
      battle.koTimer = 0;
      return;
    }
    if (battle.player.hp <= 0) {
      battle.state = 'PLAYER_KO';
      battle.koTarget = 'player';
      battle.koTimer = 0;
      return;
    }
    battle.state = 'ACTION';
    return;
  }
  const turn = battle.turnQueue[battle.turnIdx];
  const attacker = turn.attacker === 'player' ? battle.player : battle.enemy;
  const defender = turn.attacker === 'player' ? battle.enemy : battle.player;

  // Check if attacker is KO
  if (attacker.hp <= 0) {
    battle.turnIdx++;
    executeTurn();
    return;
  }

  const move = turn.move;
  move.pp = Math.max(0, move.pp - 1);

  // Calculate damage
  const result = calcDamage(attacker, defender, move);

  const attackerName = attacker.name;
  const moveName = move.name;

  showBattleMessage(attackerName + ' utilise ' + moveName + '!', () => {
    // Play attack animation
    battle.animType = 'attack';
    battle.animTimer = 0;
    battle.animData = {
      attacker: turn.attacker,
      moveType: move.type,
      result: result,
      defender: defender,
      phase: 0
    };
    battle.state = 'ANIM';
  });
}

function calcDamage(attacker, defender, move) {
  if (move.power === 0) {
    return { damage: 0, effectiveness: 1, crit: false, message: null };
  }
  const level = attacker.level;
  const power = move.power;
  const isPhysical = move.category === 'physical';
  const atk = isPhysical ? attacker.stats.atk : attacker.stats.sp_atk;
  const def = isPhysical ? defender.stats.def : defender.stats.sp_def;

  // STAB
  const stab = attacker.types.includes(move.type) ? 1.5 : 1;

  // Type effectiveness
  const effectiveness = getEffectiveness(move.type, defender.types);

  // Crit
  const crit = Math.random() < 0.0625 ? 1.5 : 1;

  // Random factor
  const rand = 0.85 + Math.random() * 0.15;

  let damage = Math.floor(((2 * level / 5 + 2) * power * atk / def / 50 + 2) * stab * effectiveness * crit * rand);
  damage = Math.max(1, damage);

  let message = null;
  if (effectiveness > 1) message = "C'est super efficace!";
  else if (effectiveness < 1 && effectiveness > 0) message = "Ce n'est pas tres efficace...";
  else if (effectiveness === 0) message = "Ca n'affecte pas " + defender.name + "...";

  return { damage, effectiveness, crit: crit > 1, message };
}

function getEffectiveness(moveType, defenderTypes) {
  let mult = 1;
  for (const dt of defenderTypes) {
    const chart = typeChart[moveType];
    if (chart && chart[dt] !== undefined) {
      mult *= chart[dt];
    }
  }
  return mult;
}

function updateBattleTurnExec(dt) {
  // Handled by executeTurn chain
}

function updateBattleAnim(dt) {
  battle.animTimer += dt;
  const data = battle.animData;
  const t = battle.animTimer;

  if (data.phase === 0) {
    // Phase 0: attacker advances (0.15s)
    if (t >= 0.15) {
      data.phase = 1;
      battle.animTimer = 0;
    }
  } else if (data.phase === 1) {
    // Phase 1: type flash (0.1s)
    battle.flashColor = COL.types[data.moveType] || '#FFF';
    battle.flashTimer = 0.1;
    if (t >= 0.1) {
      data.phase = 2;
      battle.animTimer = 0;
    }
  } else if (data.phase === 2) {
    // Phase 2: attacker recedes (0.15s)
    if (t >= 0.15) {
      data.phase = 3;
      battle.animTimer = 0;
      // Apply damage
      const result = data.result;
      if (result.effectiveness === 0) {
        // Immune
      } else {
        data.defender.hp = Math.max(0, data.defender.hp - result.damage);
      }
      // Update HP targets
      battle.playerHpTarget = battle.player.hp;
      battle.enemyHpTarget = battle.enemy.hp;
      // Screen effects
      if (result.crit || result.effectiveness > 1) {
        battle.screenShake = 0.3;
      }
    }
  } else if (data.phase === 3) {
    // Phase 3: defender shake (0.3s) + HP drops
    if (t >= 0.8) {
      data.phase = 4;
      battle.animTimer = 0;
    }
  } else if (data.phase === 4) {
    // Show effectiveness message
    const result = data.result;
    const messages = [];
    if (result.crit) messages.push('Coup critique!');
    if (result.message) messages.push(result.message);
    if (messages.length > 0) {
      showBattleMessage(messages, () => {
        battle.turnIdx++;
        // Check KO before continuing
        if (battle.enemy.hp <= 0) {
          battle.state = 'ENEMY_KO';
          battle.koTarget = 'enemy';
          battle.koTimer = 0;
        } else if (battle.player.hp <= 0) {
          battle.state = 'PLAYER_KO';
          battle.koTarget = 'player';
          battle.koTimer = 0;
        } else {
          battle.state = 'TURN_EXEC';
          executeTurn();
        }
      });
    } else {
      battle.turnIdx++;
      if (battle.enemy.hp <= 0) {
        battle.state = 'ENEMY_KO';
        battle.koTarget = 'enemy';
        battle.koTimer = 0;
      } else if (battle.player.hp <= 0) {
        battle.state = 'PLAYER_KO';
        battle.koTarget = 'player';
        battle.koTimer = 0;
      } else {
        battle.state = 'TURN_EXEC';
        executeTurn();
      }
    }
  }
}

function updateBattleMessage(dt) {
  battle.messageTimer += dt;
  const target = battle.messages[battle.messageIdx];
  if (battle.messageCharIdx < target.length) {
    if (battle.messageTimer >= 0.03) {
      battle.messageTimer -= 0.03;
      battle.messageCharIdx++;
      battle.messageText = target.substring(0, battle.messageCharIdx);
    }
    if (isConfirm()) {
      battle.messageCharIdx = target.length;
      battle.messageText = target;
    }
  } else {
    if (isConfirm()) {
      battle.messageIdx++;
      if (battle.messageIdx >= battle.messages.length) {
        if (battle.messageCallback) {
          const cb = battle.messageCallback;
          battle.messageCallback = null;
          cb();
        }
      } else {
        battle.messageCharIdx = 0;
        battle.messageText = '';
        battle.messageTimer = 0;
      }
    }
  }
}

function updateEnemyKO(dt) {
  battle.koTimer += dt;
  if (battle.koTimer >= 0.6) {
    const enemy = battle.enemy;
    // Calc EXP
    const expGain = Math.floor(enemy.baseExpYield * enemy.level / 7);
    battle.expGained = expGain;
    showBattleMessage(enemy.name + ' est K.O.!', () => {
      // Trainer: check for next pokemon
      if (battle.isTrainer) {
        const td = battle.trainerData;
        td.currentIdx++;
        if (td.currentIdx < td.team.length) {
          const nextPkmn = td.team[td.currentIdx];
          battle.enemy = nextPkmn;
          battle.enemyHpDisplay = nextPkmn.hp;
          battle.enemyHpTarget = nextPkmn.hp;
          battle.enemySlideX = 320;
          battle.koTimer = 0;
          showBattleMessage(td.trainer.name + ' envoie ' + nextPkmn.name + '!', () => {
            battle.enemySlideX = battle.enemyTargetX;
            battle.state = 'ACTION';
          });
          return;
        }
      }
      // Award EXP
      showBattleMessage(battle.player.name + ' gagne ' + expGain + ' points d\'EXP!', () => {
        battle.player.exp += expGain;
        // Check level up
        if (battle.player.exp >= battle.player.expToNext) {
          battle.player.level++;
          battle.player.exp -= battle.player.expToNext;
          battle.player.expToNext = Math.floor(Math.pow(battle.player.level + 1, 3));
          // Recalc stats
          const data = pokemonData[battle.player.id];
          if (data) {
            const newStats = calcStats(data.base_stats, battle.player.level);
            const hpDiff = newStats.hp - battle.player.maxHp;
            battle.player.maxHp = newStats.hp;
            battle.player.hp += hpDiff;
            battle.player.stats = newStats;
          }
          showBattleMessage(battle.player.name + ' monte au niveau ' + battle.player.level + '!', () => {
            endBattle(true);
          });
        } else {
          endBattle(true);
        }
      });
    });
    battle.state = 'MESSAGE';
  }
}

function updatePlayerKO(dt) {
  battle.koTimer += dt;
  if (battle.koTimer >= 0.6) {
    showBattleMessage(battle.player.name + ' est K.O.!', () => {
      showBattleMessage('Tu n\'as plus de Pokemon...', () => {
        // Heal and return
        battle.player.hp = battle.player.maxHp;
        battle.player.moves.forEach(m => m.pp = m.maxPp);
        endBattle(false);
      });
    });
    battle.state = 'MESSAGE';
  }
}

function updateBattleExp(dt) {
  // Not used separately, handled in messages
}

function endBattle(won) {
  if (won && battle.isTrainer) {
    battle.trainerData.trainer.defeated = true;
  }
  // Fade back to overworld
  fadeAlpha = 1;
  fadeDir = -1;
  battle = null;
  gameState = 'OVERWORLD';
}

// ============================================================
// === BATTLE DRAWING ===
// ============================================================
function drawBattle(dt) {
  if (!battle) return;

  // Screen shake offset
  let shakeX = 0, shakeY = 0;
  if (battle.screenShake > 0) {
    shakeX = (Math.random() - 0.5) * 8;
    shakeY = (Math.random() - 0.5) * 8;
  }
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background (0 to 280)
  const bgKey = 'bbg_' + battle.bgType;
  if (images[bgKey]) {
    ctx.drawImage(images[bgKey], 0, 0, W, 280);
  } else {
    // Fallback gradient
    const grad = ctx.createLinearGradient(0, 0, 0, 280);
    if (battle.bgType === 'forest') {
      grad.addColorStop(0, '#337329'); grad.addColorStop(0.4, '#1E591A'); grad.addColorStop(1, '#2E661E');
    } else if (battle.bgType === 'cave') {
      grad.addColorStop(0, '#1E1A2E'); grad.addColorStop(0.4, '#33303F'); grad.addColorStop(1, '#4D4752');
    } else {
      grad.addColorStop(0, '#73B3F2'); grad.addColorStop(0.4, '#4D9438'); grad.addColorStop(1, '#598C33');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, 280);
    // Platforms
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(440, 165, 100, 24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(200, 250, 110, 28, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Idle bobbing
  const bobEnemy = Math.sin(battle.bobTimer * 4) * 3;
  const bobPlayer = Math.sin(battle.bobTimer * 4 + 1) * 3;

  // Defender shake during attack anim phase 3
  let playerShakeX = 0, enemyShakeX = 0;
  if (battle.state === 'ANIM' && battle.animData.phase === 3) {
    const shakeAmt = Math.sin(battle.animTimer * 40) * 4;
    if (battle.animData.attacker === 'player') enemyShakeX = shakeAmt;
    else playerShakeX = shakeAmt;
  }

  // Attacker advance during attack anim
  let playerAdvance = 0, enemyAdvance = 0;
  if (battle.state === 'ANIM') {
    if (battle.animData.phase === 0) {
      const prog = battle.animTimer / 0.15;
      if (battle.animData.attacker === 'player') playerAdvance = prog * 16;
      else enemyAdvance = -prog * 16;
    }
    if (battle.animData.phase === 2) {
      const prog = 1 - battle.animTimer / 0.15;
      if (battle.animData.attacker === 'player') playerAdvance = prog * 16;
      else enemyAdvance = -prog * 16;
    }
  }

  // Enemy sprite (96x96 drawn at 192x192) - positioned right side
  const enemyDrawX = battle.enemySlideX * 2 + enemyShakeX + enemyAdvance;
  const enemyDrawY = 30 + bobEnemy;
  let enemyAlpha = 1;
  let enemyOffsetY = 0;
  if (battle.koTarget === 'enemy' && (battle.state === 'ENEMY_KO' || battle.state === 'MESSAGE')) {
    const koProgress = Math.min(1, battle.koTimer / 0.5);
    enemyOffsetY = koProgress * 60;
    enemyAlpha = 1 - koProgress;
  }
  ctx.globalAlpha = enemyAlpha;
  const enemyFrontKey = 'pkmn_front_' + battle.enemy.id;
  if (images[enemyFrontKey]) {
    ctx.drawImage(images[enemyFrontKey], enemyDrawX, enemyDrawY + enemyOffsetY, 192, 192);
  } else {
    ctx.fillStyle = COL.types[battle.enemy.types[0]] || '#AAA';
    ctx.fillRect(enemyDrawX + 20, enemyDrawY + 20 + enemyOffsetY, 152, 152);
    drawText(battle.enemy.name, enemyDrawX + 40, enemyDrawY + 80 + enemyOffsetY, '#FFF', 14);
  }
  ctx.globalAlpha = 1;

  // Player back sprite (positioned left side)
  const playerDrawX = battle.playerSlideX * 2 + playerShakeX + playerAdvance;
  const playerDrawY = 130 + bobPlayer;
  let playerAlpha = 1;
  let playerOffsetY = 0;
  if (battle.koTarget === 'player' && (battle.state === 'PLAYER_KO' || battle.state === 'MESSAGE')) {
    const koProgress = Math.min(1, battle.koTimer / 0.5);
    playerOffsetY = koProgress * 60;
    playerAlpha = 1 - koProgress;
  }
  ctx.globalAlpha = playerAlpha;
  const playerBackKey = 'pkmn_back_' + battle.player.id;
  if (images[playerBackKey]) {
    ctx.drawImage(images[playerBackKey], playerDrawX, playerDrawY + playerOffsetY, 192, 192);
  } else {
    ctx.fillStyle = COL.types[battle.player.types[0]] || '#AAA';
    ctx.fillRect(playerDrawX + 20, playerDrawY + 20 + playerOffsetY, 152, 152);
    drawText(battle.player.name, playerDrawX + 30, playerDrawY + 80 + playerOffsetY, '#FFF', 14);
  }
  ctx.globalAlpha = 1;

  // Type flash overlay
  if (battle.flashTimer > 0) {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = battle.flashColor || '#FFF';
    ctx.fillRect(0, 0, W, 280);
    ctx.globalAlpha = 1;
  }

  // === HP BOX ENEMY (top-left) ===
  const ehbX = 20, ehbY = 20;
  const ehbW = 220, ehbH = 50;
  // Fade in after intro
  const hpBoxAlpha = battle.playerSlideX >= battle.playerTargetX ? 1 : 0;
  if (hpBoxAlpha > 0) {
    ctx.globalAlpha = hpBoxAlpha;
    drawRoundRect(ehbX, ehbY, ehbW, ehbH, 6, COL.panel, COL.border);
    drawTextShadow(battle.enemy.name, ehbX + 10, ehbY + 6, COL.text, 14);
    drawText('Lv' + battle.enemy.level, ehbX + ehbW - 50, ehbY + 6, COL.text, 12);
    // HP bar
    const hpRatio = battle.enemyHpDisplay / battle.enemy.maxHp;
    const hpCol = hpRatio > 0.5 ? COL.hpGreen : hpRatio > 0.2 ? COL.hpYellow : COL.hpRed;
    drawRect(ehbX + 10, ehbY + 28, ehbW - 20, 10, '#222');
    drawRect(ehbX + 10, ehbY + 28, (ehbW - 20) * Math.max(0, hpRatio), 10, hpCol);
    ctx.strokeStyle = '#444';
    ctx.strokeRect(ehbX + 10, ehbY + 28, ehbW - 20, 10);
    ctx.globalAlpha = 1;
  }

  // === HP BOX PLAYER (bottom-right of battle area) ===
  const phbX = 350, phbY = 200;
  const phbW = 270, phbH = 72;
  if (hpBoxAlpha > 0) {
    ctx.globalAlpha = hpBoxAlpha;
    drawRoundRect(phbX, phbY, phbW, phbH, 6, COL.panel, COL.border);
    drawTextShadow(battle.player.name, phbX + 10, phbY + 6, COL.text, 14);
    drawText('Lv' + battle.player.level, phbX + phbW - 50, phbY + 6, COL.text, 12);
    // HP bar
    const hpRatio = battle.playerHpDisplay / battle.player.maxHp;
    const hpCol = hpRatio > 0.5 ? COL.hpGreen : hpRatio > 0.2 ? COL.hpYellow : COL.hpRed;
    drawRect(phbX + 10, phbY + 28, phbW - 20, 10, '#222');
    drawRect(phbX + 10, phbY + 28, (phbW - 20) * Math.max(0, hpRatio), 10, hpCol);
    ctx.strokeStyle = '#444';
    ctx.strokeRect(phbX + 10, phbY + 28, phbW - 20, 10);
    // HP numbers
    drawText(Math.ceil(battle.playerHpDisplay) + ' / ' + battle.player.maxHp, phbX + phbW - 110, phbY + 42, COL.text, 12);
    // EXP bar
    const expRatio = battle.player.expToNext > 0 ? battle.player.exp / battle.player.expToNext : 0;
    drawRect(phbX + 10, phbY + 58, phbW - 20, 6, '#222');
    drawRect(phbX + 10, phbY + 58, (phbW - 20) * Math.min(1, expRatio), 6, COL.expBlue);
    ctx.globalAlpha = 1;
  }

  // === TEXT BOX (280 to 380) ===
  drawRoundRect(0, 280, W, 100, 0, COL.panel, COL.border);
  // Draw current message or prompt
  if (battle.state === 'MESSAGE') {
    drawText(battle.messageText, 20, 300, COL.text, 18);
    if (battle.messageCharIdx >= battle.messages[battle.messageIdx].length) {
      if (Math.sin(battle.timer * 5) > 0) {
        drawText('v', W - 30, 350, COL.text, 14);
      }
    }
  } else if (battle.state === 'ACTION') {
    drawText('Que doit faire ' + battle.player.name + ' ?', 20, 300, COL.text, 18);
  } else if (battle.state === 'INTRO') {
    drawText('...', 20, 300, COL.text, 18);
  } else if (battle.state === 'ANIM' || battle.state === 'TURN_EXEC') {
    drawText(battle.messageText || '...', 20, 300, COL.text, 18);
  } else if (battle.state === 'ENEMY_KO' || battle.state === 'PLAYER_KO') {
    drawText('...', 20, 300, COL.text, 18);
  }

  // === BOTTOM PANEL (380 to 480) ===
  drawRect(0, 380, W, 100, '#1A1A2E');
  drawRoundRect(0, 380, W, 100, 0, COL.panel, COL.border);

  if (battle.state === 'ACTION') {
    // 2x2 action menu on left
    const actions = ['ATTAQUE', 'SAC', 'POKEMON', 'FUITE'];
    const menuX = 20, menuY = 395;
    const colW = 140, rowH = 36;
    actions.forEach((action, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const ax = menuX + col * colW;
      const ay = menuY + row * rowH;
      const selected = i === battle.actionCursor;
      if (selected) {
        drawRoundRect(ax - 2, ay - 2, colW - 10, rowH - 4, 4, '#3A3A5A', COL.gold);
      }
      const prefix = selected ? (Math.sin(battle.timer * 4) > 0 ? '> ' : '  ') : '  ';
      drawTextShadow(prefix + action, ax + 8, ay + 6, selected ? COL.gold : COL.text, 16);
    });
    // Info text on right
    drawText('Fleches: Naviguer', 380, 400, '#666688', 11);
    drawText('Entree: Confirmer', 380, 420, '#666688', 11);
    drawText('Echap: Retour', 380, 440, '#666688', 11);
  } else if (battle.state === 'MOVE_SELECT') {
    // 4 moves on right
    const moves = battle.player.moves;
    const moveStartX = 10;
    const moveStartY = 390;
    const moveH = 22;
    moves.forEach((m, i) => {
      const my = moveStartY + i * moveH;
      const selected = i === battle.moveCursor;
      if (selected) {
        drawRoundRect(moveStartX, my, W - 20, moveH - 2, 3, '#3A3A5A', COL.gold);
      }
      const prefix = selected ? '> ' : '  ';
      // Type badge
      const typeCol = COL.types[m.type] || '#888';
      drawRoundRect(moveStartX + 30, my + 2, 65, 16, 3, typeCol, null);
      drawText(m.type.toUpperCase(), moveStartX + 33, my + 3, '#FFF', 10);
      // Move name
      drawTextShadow(prefix + m.name, moveStartX + 105, my + 2, selected ? COL.gold : COL.text, 14);
      // PP
      const ppCol = m.pp <= 0 ? COL.hpRed : m.pp <= m.maxPp / 4 ? COL.hpYellow : COL.text;
      drawText('PP ' + m.pp + '/' + m.maxPp, W - 110, my + 3, ppCol, 12);
    });
    drawText('Echap: Retour', 20, 475, '#666688', 10);
  } else {
    // Empty or message state
  }

  ctx.restore();

  // Fade overlay for battle end
  if (fadeAlpha > 0) {
    ctx.globalAlpha = fadeAlpha;
    drawRect(0, 0, W, H, '#000');
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// === LOADING SCREEN ===
// ============================================================
let loadingTime = 0;

function updateLoading(dt) {
  loadingTime += dt;
  if (allLoaded && dataLoaded >= DATA_TOTAL && loadingTime > 0.5) {
    gameState = 'TITLE';
  }
}

function drawLoading(dt) {
  drawRect(0, 0, W, H, '#080810');
  drawTextShadow('POKEMON AMSO', W/2, H/2 - 40, COL.gold, 28, 'center');
  // Loading bar
  const progress = loadTotal > 0 ? loadCount / loadTotal : 0;
  drawRect(W/2 - 100, H/2 + 10, 200, 16, '#222');
  drawRect(W/2 - 100, H/2 + 10, 200 * progress, 16, COL.gold);
  drawText('Chargement... ' + Math.floor(progress * 100) + '%', W/2, H/2 + 35, COL.text, 12, 'center');
  // Pokeball spinner
  const angle = loadingTime * 3;
  const bx = W/2 + Math.cos(angle) * 4;
  const by = H/2 - 10 + Math.sin(angle) * 4;
  ctx.beginPath();
  ctx.arc(bx, by - 60, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#E53935';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx, by - 60, 10, 0, Math.PI);
  ctx.fillStyle = '#FFF';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx, by - 60, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#333';
  ctx.fill();
}

// ============================================================
// === GAME LOOP ===
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // Cap at 50ms
  lastTime = timestamp;

  updateInput();

  // Clear
  ctx.clearRect(0, 0, W, H);

  switch (gameState) {
    case 'LOADING':
      updateLoading(dt);
      drawLoading(dt);
      break;
    case 'TITLE':
      updateTitle(dt);
      drawTitle(dt);
      break;
    case 'STARTER_SELECT':
      updateStarterSelect(dt);
      drawStarterSelect(dt);
      break;
    case 'OVERWORLD':
      updateOverworld(dt);
      drawOverworld(dt);
      break;
    case 'BATTLE':
      updateBattle(dt);
      drawBattle(dt);
      break;
  }

  requestAnimationFrame(gameLoop);
}

// ============================================================
// === INIT ===
// ============================================================
initAssets();
requestAnimationFrame(gameLoop);

</script>
